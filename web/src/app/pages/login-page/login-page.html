<!-- Estado de carga -->
@if(loading){
    <div class="loading-state">
        <div class="spinner"></div>
    </div>
}
@else {
    <div class="login-wrapper">
        <div class="beach-section">
            <img src="https://images.pexels.com/photos/457882/pexels-photo-457882.jpeg?auto=compress&cs=tinysrgb&w=1920"
                alt="Tropical Paradise Beach" class="beach-background" loading="eager" fetchpriority="high">

            <div class="sun-rays"></div>
            <div class="beach-overlay"></div>



            <div class="beach-text">
                <div class="mascot-container">
                    <img src="nomadia-penguin.png" alt="Nomadia Penguin" class="mascot" loading="eager">
                </div>
                <div class="dialog-bubble">
                    <p>Iniciá sesión y <span class="highlight">sigamos planeando</span> tu próxima aventura juntos.</p>
                </div>
            </div>
        </div>

    <div class="login-section">
        <div class="login-card">
            <div class="logo">
                <img src="nomadia-logo.png" alt="" srcset="">
            </div>


            <div class="welcome-text">
                <h3>¡Bienvenido de vuelta!</h3>
                <p>Tu próxima aventura te espera</p>
            </div>

            <form [formGroup]="logForm" (submit)="login()">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="tu@email.com" required formControlName="email" [ngClass]="{'input-invalid': invalidCredentials}">

                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div style="position: relative;">
                        <input [type]="showPassword ? 'text' : 'password'" id="password" placeholder="••••••••" required formControlName="password" [ngClass]="{'input-invalid': invalidCredentials}">
                        <i [class]="showPassword ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash'"
                           (click)="togglePasswordVisibility()"
                           style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;"></i>
                    </div>
                </div>

                @if(loginError){
                    <p class="formError">{{loginError}}</p>
                }

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" formControlName="remember">
                        <span>Recordarme</span>
                    </label>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>


            <div class="signup-link">
                ¿No tenés cuenta? <a routerLink="/register">Registrate acá</a>
            </div>
        </div>
    </div>
</div>
}
